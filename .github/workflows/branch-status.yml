name: Branch Status

# Fails this workflow when Supabase's "Supabase Preview" check reports a
# failure on a PR that touches supabase/**. A failed workflow run triggers
# GitHub's built-in email notification (Settings -> Notifications -> Actions),
# so you get an email whenever a preview branch fails to migrate/seed.

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    branches:
      - main
    paths:
      - 'supabase/**'

jobs:
  failed:
    runs-on: ubuntu-latest
    steps:
      - uses: fountainhead/action-wait-for-check@v1.2.0
        id: check
        with:
          checkName: Supabase Preview
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - if: ${{ steps.check.outputs.conclusion == 'failure' }}
        run: exit 1
