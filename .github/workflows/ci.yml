name: CI

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # CLI version is pinned via the `supabase` devDependency (package.json /
      # package-lock.json) so local and CI run the identical binary + service
      # images. `npm ci` above installs it; `npx supabase` resolves the locked
      # binary. Bump deliberately with `npm i -D supabase@latest --save-exact`,
      # never via a floating `setup-cli` action.
      - name: Start Supabase
        run: npx supabase start -x studio,imgproxy,edge-runtime,pooler

      - name: Export Supabase env
        run: |
          STATUS=$(npx supabase status -o json)
          echo "NEXT_PUBLIC_SUPABASE_URL=$(echo "$STATUS" | jq -r '.API_URL')" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$(echo "$STATUS" | jq -r '.PUBLISHABLE_KEY')" >> "$GITHUB_ENV"
          echo "SUPABASE_SERVICE_ROLE_KEY=$(echo "$STATUS" | jq -r '.SERVICE_ROLE_KEY')" >> "$GITHUB_ENV"
          echo "DATABASE_URL=$(echo "$STATUS" | jq -r '.DB_URL')" >> "$GITHUB_ENV"

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:run

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E
        run: npm run test:e2e